<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/signup.css">
    <link rel="stylesheet" href="css/global-nav.css">
    <title>정다운 아카이브 회원가입</title>
</head>
<body id="top">
    <header class="global-header">
        <a class="global-brand" href="index.html">정다운 아카이브</a>
        <nav class="global-nav" aria-label="주요 메뉴">
            <a href="index.html">Home</a>
            <a href="myProfile.html">소개</a>
            <a href="signUp.html" aria-current="page">회원가입</a>
            <a href="trip.html">여행 기록</a>
            <a href="bag.html">내 가방</a>
            <a href="todo.html">할 일 관리</a>
        </nav>
        <button type="button" class="theme-button" id="themeButton">🌙 다크모드</button>
    </header>

    <section class="page-intro signup-intro">
        <h1>👤 정다운 아카이브 회원가입</h1>
    </section>

    <main>
        <form action="result.html" method="get">
            <fieldset>
                <legend>계정 정보</legend>
                <p>
                    <label for="userName">이름: </label>
                    <input type="text" id="userName" name="userName" required placeholder="이름을 입력하세요">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="userId">아이디: </label>
                    <input type="text" id="userId" name="userId" required pattern="[A-Za-z0-9]{4,12}" minlength="4" maxlength="12" placeholder="4~12자 영문/숫자">
                    <small>(필수, 영문/숫자 4~12자)</small>
                </p>
                <p>
                    <label for="userPw">비밀번호: </label>
                    <input type="password" id="userPw" name="userPw" required minlength="8" placeholder="8자 이상 입력">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="userEmail">이메일: </label>
                    <input type="email" id="userEmail" name="userEmail" required placeholder="example@email.com">
                    <small>(필수)</small>
                </p>
                <p>
                    <label for="userTel">전화번호: </label>
                    <input type="tel" id="userTel" name="userTel" pattern="010-[0-9]{4}-[0-9]{4}" placeholder="010-0000-0000">
                </p>
            </fieldset>

            <fieldset>
                <legend>개인 프로필 정보</legend>
                <p>
                    <label for="userBirth">생년월일: </label>
                    <input type="date" id="userBirth" name="userBirth" min="1900-01-01" max="2026-12-31">
                </p>
                <p>
                    성별:
                    <label><input type="radio" name="gender" value="남성" checked> 남성</label>
                    <label><input type="radio" name="gender" value="여성"> 여성</label>
                    <label><input type="radio" name="gender" value="선택안함"> 선택안함</label>
                </p>
                <p>
                    관심 분야 (중복 선택 가능): <br>
                    <label><input type="checkbox" name="interest" value="프론트엔드"> 프론트엔드</label><br>
                    <label><input type="checkbox" name="interest" value="디자인"> 디자인</label><br>
                    <label><input type="checkbox" name="interest" value="백엔드"> 백엔드</label><br>
                    <label><input type="checkbox" name="interest" value="클라우드"> 클라우드</label>
                </p>
                <p>
                    <label for="region">지역: </label>
                    <select name="region" id="region">
                        <option value="">--선택해 주세요--</option>
                        <option value="광주">광주</option>
                        <option value="서울">서울</option>
                        <option value="부산">부산</option>
                        <option value="제주">제주</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>자기소개</legend>
                <p>
                    <label for="intro">나를 표현하는 한 줄 소개 또는 가입 인사: </label><br>
                    <textarea name="intro" id="intro" rows="5" cols="50" maxlength="200" placeholder="여기에 내용을 입력하세요 (최대 200자)"></textarea>
                </p>
            </fieldset>

            <fieldset>
                <legend>약관 동의</legend>
                <p>
                    <label>
                        <input type="checkbox" name="agree" value="동의" required>
                        서비스 이용 약관에 동의합니다.
                    </label>
                    <small>(필수)</small>
                </p>
            </fieldset>

            <p class="button-area">
                <input type="submit" value="동의하고 회원가입">
                <input type="reset" value="다시 작성">
            </p>
        </form>
    </main>

    <a class="top-button" href="#">↑ TOP</a>
    <script src="script/theme.js"></script>
</body>
</html>
