<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>회원가입 결과</title>
</head>
<body>
    <header>
        <h1>🎉 회원가입 결과</h1>
        <p>입력하신 회원가입 정보를 확인해 주세요.</p>
    </header>

    <main>
        <section>
            <h2>🎉 회원가입을 진심으로 축하합니다!</h2>
            <p>SKALA-FRONT 회원이 되신 것을 환영합니다.</p>
        </section>

        <section>
            <h2>📋 입력 정보</h2>

            <table>
                <tbody id="resultTable">
                    <tr>
                        <th>항목</th>
                        <th>입력값</th>
                    </tr>
                </tbody>
            </table>
        </section>

        <section>
            <h2>안내 사항</h2>
            <ul>
                <li>입력하신 이메일 주소로 가입 확인 메일이 발송되었습니다.</li>
                <li>보안을 위해 첫 로그인 후 비밀번호를 다시 한번 확인해 주세요.</li>
                <li>작성하신 프로필 정보는 마이페이지에서 언제든지 수정이 가능합니다.</li>
            </ul>
        </section>

        <section>
            <h2>이동하기</h2>
            <p>아래 링크를 클릭하면 관련 페이지로 이동할 수 있습니다.</p>

            <ul>
                <li><a href="index.html">👤 회원가입 다시 작성하기</a></li>
            </ul>
        </section>
    </main>

    <script src="script/result.js"></script>
</body>
</html>
