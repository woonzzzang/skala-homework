<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <title>myTrip</title>
</head>
<body>
    <div class="container">
        <h1>🌏 나의 여행 앨범 🎵</h1>
        <audio controls autoplay>
            <source src="./media/sunoai.wav" type="audio/wav" alt="여행에 어울리도록 suno ai에서 생성한 음악">
        </audio>

        <hr>

        <p class="trip-card">
            <img width="500" src="./media/lijang.png" alt="리장의 호도협을 chatGPT에게 그려달라고 해서 생성한 이미지">
            <br>
            리장 호도협 (2025년)
        </p>

        <p class="trip-card">
            <img width="500" src="./media/sebu.png" alt="세부의 탑스힐을 chatGPT에게 그려달라고 해서 생성한 이미지">
            <br>
            세부 탑스힐 (2024년)
        </p>

        <p class="trip-card">
            <img width="500" src="./media/hokkaido.png" alt="홋카이도의 대설산을 chatGPT에게 그려달라고 해서 생성한 이미지">
            <br>
            홋카이도 대설산 (2025년)
        </p>

        <hr>

        <h2>📹 나의 여행 브이로그</h2>
        <video width="500" autoplay>
            <source src="./media/music.mp4" type="video/mp4" alt="걸그룹 리센느의 신곡 Pretty Girl 무대 영상을 소리 없이 9초 녹화한 동영상">
        </video>
        <p>리센느의 아름다운 음악 ✈️</p>
    </div>

</body>
</html>
